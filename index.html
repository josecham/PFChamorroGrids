<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Journal Pro V4</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0e11">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgMain: '#0b0e11',
                        bgCard: '#181a20',
                        bgInput: '#2b2f36',
                        cryptoGreen: '#0ecb81',
                        cryptoRed: '#f6465d',
                        gold: '#f0b90b'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0e11;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-200 font-sans antialiased">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const hoy = new Date();
            
            const [mesVista, setMesVista] = useState(hoy.getMonth());
            const [añoVista, setAñoVista] = useState(hoy.getFullYear());
            const [vista, setVista] = useState('calendario');

            // Cargar trades desde localStorage
            const [trades, setTrades] = useState(() => {
                const guardados = localStorage.getItem('trading_journal_trades');
                if (guardados) {
                    return JSON.parse(guardados);
                } else {
                    // Datos semilla de ejemplo distribuidos en diferentes meses/fechas simuladas
                    return [
                        { id: 1711929600000, activo: 'BTC', resultado: 550.00, estado: 'WIN', dia: 12, mes: 2, año: 2026 },
                        { id: 1714521600000, activo: 'ETH', resultado: -320.00, estado: 'LOSS', dia: 5, mes: 3, año: 2026 },
                        { id: 1717113600000, activo: 'SOL', resultado: 1200.00, estado: 'WIN', dia: 10, mes: 4, año: 2026 },
                        { id: 1717113600001, activo: 'AVAX', resultado: -150.00, estado: 'LOSS', dia: 20, mes: 4, año: 2026 }
                    ];
                }
            });

            const [activo, setActivo] = useState('');
            const [resultado, setResultado] = useState('');
            const [estado, setEstado] = useState('WIN');
            const [diaSeleccionado, setDiaSeleccionado] = useState(hoy.getDate());
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                localStorage.setItem('trading_journal_trades', JSON.stringify(trades));
            }, [trades]);

            const nombreMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const diasSemana = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
            
            const primerDiaIndex = new Date(añoVista, mesVista, 1).getDay();
            const totalDiasMes = new Date(añoVista, mesVista + 1, 0).getDate();

            // Filtrados de información
            const tradesDelMesActual = trades.filter(t => t.mes === mesVista && t.año === añoVista);
            
            const obtenerDataDia = (nroDia) => {
                const tradesDelDia = tradesDelMesActual.filter(t => t.dia === nroDia);
                if (tradesDelDia.length === 0) return null;
                const pnlTotal = tradesDelDia.reduce((acc, t) => acc + t.resultado, 0);
                return { pnl: pnlTotal, count: tradesDelDia.length };
            };

            const cambiarMes = (direccion) => {
                if (direccion === 'prev') {
                    if (mesVista === 0) {
                        setMesVista(11); setAñoVista(añoVista - 1);
                    } else {
                        setMesVista(mesVista - 1);
                    }
                } else {
                    if (mesVista === 11) {
                        setMesVista(0); setAñoVista(añoVista + 1);
                    } else {
                        setMesVista(mesVista + 1);
                    }
                }
            };

            const agregarTrade = (e) => {
                e.preventDefault();
                if (!activo || !resultado) return;

                const monto = parseFloat(resultado);
                const nuevoTrade = {
                    id: Date.now(),
                    activo: activo.toUpperCase(),
                    resultado: estado === 'WIN' ? Math.abs(monto) : -Math.abs(monto),
                    estado,
                    dia: parseInt(diaSeleccionado),
                    mes: mesVista,
                    año: añoVista
                };

                setTrades([nuevoTrade, ...trades]);
                setActivo('');
                setResultado('');
            };

            const eliminarTrade = (id) => {
                setTrades(trades.filter(t => t.id !== id));
            };

            // --- CÁLCULOS GLOBALES Y MENSUALES ---
            const totalPnlMes = tradesDelMesActual.reduce((acc, t) => acc + t.resultado, 0);
            const totalPnlAcumulado = trades.reduce((acc, t) => acc + t.resultado, 0); // Todo el historial
            
            const winRateMes = tradesDelMesActual.length > 0 
                ? Math.round((tradesDelMesActual.filter(t => t.estado === 'WIN').length / tradesDelMesActual.length) * 100) 
                : 0;
            
            const winRateGlobal = trades.length > 0
                ? Math.round((trades.filter(t => t.estado === 'WIN').length / trades.length) * 100)
                : 0;

            // --- Renderizado del Gráfico Histórico ---
            useEffect(() => {
                if (vista === 'metricas' && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    // Grafica TODOS los trades históricos en orden de ejecución real
                    const tradesCronologicos = [...trades].sort((a, b) => a.id - b.id);
                    let balanceAcumulado = 0;
                    
                    const dataPuntos = [0];
                    const etiquetas = ["Inicio"];

                    tradesCronologicos.forEach((t, index) => {
                        balanceAcumulado += t.resultado;
                        dataPuntos.push(balanceAcumulado);
                        etiquetas.push(`${t.dia}/${t.mes + 1} (${t.activo})`);
                    });

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: etiquetas,
                            datasets: [{
                                label: 'Equity Curve ($)',
                                data: dataPuntos,
                                borderColor: balanceAcumulado >= 0 ? '#0ecb81' : '#f6465d',
                                backgroundColor: balanceAcumulado >= 0 ? 'rgba(14, 203, 129, 0.02)' : 'rgba(246, 70, 93, 0.02)',
                                borderWidth: 2.5,
                                pointBackgroundColor: '#f0b90b',
                                pointRadius: 3,
                                tension: 0.1,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { grid: { color: 'rgba(255, 255, 255, 0.01)' }, ticks: { color: '#848d9a', font: { size: 8 }, maxRotation: 45 } },
                                y: { grid: { color: 'rgba(255, 255, 255, 0.04)' }, ticks: { color: '#848d9a', font: { size: 9 } } }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [vista, trades]);

            return (
                <div className="min-h-screen max-w-md mx-auto bg-bgMain flex flex-col pb-24">
                    
                    {/* Header */}
                    <header className="bg-bgMain px-4 py-4 border-b border-gray-800 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-2.5 h-2.5 bg-cryptoGreen rounded-full"></div>
                            <h1 className="text-base font-black tracking-wider uppercase">Trading Journal</h1>
                        </div>
                        <span className="text-[10px] text-gray-400 bg-bgCard font-bold px-2 py-0.5 rounded-full border border-gray-800">
                            HISTORIC TRACKING
                        </span>
                    </header>

                    <main className="p-4 flex flex-col gap-5 flex-1">
                        
                        {/* SECCIÓN NAVEGACIÓN DE MESES (Solo se muestra si estás en el Calendario) */}
                        {vista === 'calendario' && (
                            <div className="bg-bgCard rounded-2xl border border-gray-800 p-4 shadow-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => cambiarMes('prev')} className="w-8 h-8 rounded-lg bg-bgInput flex items-center justify-center font-bold text-gray-400 active:bg-gray-700">&lt;</button>
                                        <h2 className="text-sm font-black text-white uppercase tracking-wide min-w-[110px] text-center">
                                            {nombreMeses[mesVista]} <span className="text-gray-500 font-mono text-xs">{añoVista}</span>
                                        </h2>
                                        <button onClick={() => cambiarMes('next')} className="w-8 h-8 rounded-lg bg-bgInput flex items-center justify-center font-bold text-gray-400 active:bg-gray-700">&gt;</button>
                                    </div>
                                    <span className={`text-xs font-bold font-mono px-2 py-1 rounded ${totalPnlMes >= 0 ? 'text-cryptoGreen bg-cryptoGreen/10' : 'text-cryptoRed bg-cryptoRed/10'}`}>
                                        {totalPnlMes >= 0 ? '+' : ''}${totalPnlMes.toLocaleString()}
                                    </span>
                                </div>

                                <div className="grid grid-cols-7 gap-1 text-center mb-1">
                                    {diasSemana.map(d => (
                                        <span key={d} className="text-[9px] text-gray-500 font-bold tracking-tighter">{d}</span>
                                    ))}
                                </div>

                                <div className="grid grid-cols-7 gap-1.5">
                                    {Array(primerDiaIndex).fill(null).map((_, i) => (
                                        <div key={`empty-${i}`} className="aspect-square bg-transparent"></div>
                                    ))}

                                    {Array(totalDiasMes).fill(null).map((_, index) => {
                                        const nroDia = index + 1;
                                        const dataDia = obtenerDataDia(nroDia);
                                        
                                        let bgCelda = "bg-bgInput/40 text-gray-400 border border-transparent";
                                        if (dataDia) {
                                            bgCelda = dataDia.pnl >= 0 ? "bg-cryptoGreen text-black font-bold" : "bg-cryptoRed text-white font-bold";
                                        }

                                        return (
                                            <div 
                                                key={nroDia} 
                                                onClick={() => setDiaSeleccionado(nroDia)}
                                                className={`aspect-square rounded-lg flex flex-col justify-between p-1 text-[10px] transition-all cursor-pointer ${bgCelda} ${diaSeleccionado === nroDia ? 'ring-2 ring-gold scale-105 z-10' : ''}`}
                                            >
                                                <span className="font-mono">{String(nroDia).padStart(2, '0')}</span>
                                                {dataDia && (
                                                    <span className="text-[7px] tracking-tighter truncate font-mono leading-none text-center block w-full">
                                                        {dataDia.pnl >= 0 ? '+' : ''}{Math.round(dataDia.pnl)}
                                                    </span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* VISTA DE MÉTRICAS AVANZADAS CON ACUMULADO */}
                        {vista === 'metricas' && (
                            <div className="bg-bgCard rounded-2xl border border-gray-800 p-4 shadow-xl flex flex-col gap-4">
                                <div>
                                    <h2 className="text-sm font-black text-white uppercase tracking-wide">Curva de Crecimiento Global</h2>
                                    <p className="text-xs text-gray-500">Rendimiento histórico de todos tus meses indexados</p>
                                </div>
                                
                                <div className="w-full relative h-[180px]">
                                    {trades.length === 0 ? (
                                        <div className="absolute inset-0 flex items-center justify-center text-xs text-gray-500 italic">No hay registros globales para computar</div>
                                    ) : (
                                        <canvas ref={chartRef}></canvas>
                                    )}
                                </div>

                                {/* Bloque de Métricas Comparativas: Mes vs Histórico */}
                                <div className="grid grid-cols-2 gap-2.5 pt-2 border-t border-gray-800/50">
                                    <div className="bg-bgMain p-3 rounded-xl border border-gray-800/60">
                                        <span className="text-[9px] text-gray-500 font-bold block uppercase tracking-wider">P&L Neto ({nombreMeses[mesVista]})</span>
                                        <span className={`text-sm font-black mt-0.5 block ${totalPnlMes >= 0 ? 'text-cryptoGreen' : 'text-cryptoRed'}`}>
                                            {totalPnlMes >= 0 ? '+' : ''}${totalPnlMes.toLocaleString()}
                                        </span>
                                        <span className="text-[9px] text-gray-400 font-mono block mt-0.5">🎯 WR: {winRateMes}%</span>
                                    </div>

                                    <div className="bg-bgMain p-3 rounded-xl border border-gold/20 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-8 h-8 bg-gold/5 rounded-full blur-md"></div>
                                        <span className="text-[9px] text-gold font-bold block uppercase tracking-wider">Total Acumulado</span>
                                        <span className={`text-sm font-black mt-0.5 block ${totalPnlAcumulado >= 0 ? 'text-cryptoGreen' : 'text-cryptoRed'}`}>
                                            {totalPnlAcumulado >= 0 ? '+' : ''}${totalPnlAcumulado.toLocaleString()}
                                        </span>
                                        <span className="text-[9px] text-gray-400 font-mono block mt-0.5">🌍 Global WR: {winRateGlobal}%</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* FORMULARIO DE REGISTRO (Solo en pestaña calendario) */}
                        {vista === 'calendario' && (
                            <div className="bg-bgCard p-4 rounded-2xl border border-gray-800 shadow-md">
                                <h3 className="text-xs font-black text-gray-400 uppercase tracking-wider mb-3">Registrar en Día {diaSeleccionado} de {nombreMeses[mesVista]}</h3>
                                <form onSubmit={agregarTrade} className="flex flex-col gap-3">
                                    <div className="grid grid-cols-2 gap-2">
                                        <input 
                                            type="text" 
                                            placeholder="Activo (BTC, SOL)" 
                                            value={activo}
                                            onChange={(e) => setActivo(e.target.value)}
                                            className="bg-bgInput text-white px-3 py-2.5 rounded-xl text-xs font-bold border border-transparent focus:border-gray-700 outline-none"
                                        />
                                        <input 
                                            type="number" 
                                            placeholder="PnL Neto USD" 
                                            value={resultado}
                                            onChange={(e) => setResultado(e.target.value)}
                                            className="bg-bgInput text-white px-3 py-2.5 rounded-xl text-xs font-mono font-bold border border-transparent focus:border-gray-700 outline-none"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <button 
                                            type="button"
                                            onClick={() => setEstado('WIN')}
                                            className={`py-2 rounded-xl text-xs font-black transition-all ${estado === 'WIN' ? 'bg-cryptoGreen text-black' : 'bg-bgInput text-gray-500'}`}
                                        >
                                            PROFIT (WIN)
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => setEstado('LOSS')}
                                            className={`py-2 rounded-xl text-xs font-black transition-all ${estado === 'LOSS' ? 'bg-cryptoRed text-white' : 'bg-bgInput text-gray-500'}`}
                                        >
                                            LOSS (PÉRDIDA)
                                        </button>
                                    </div>

                                    <button type="submit" className="w-full bg-gold text-black font-black py-3 rounded-xl text-xs uppercase tracking-widest mt-1">
                                        Añadir al Calendario
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* LISTA DE TRADES DEL PERÍODO ACTUAL */}
                        <div>
                            <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-2 px-1">Trades de {nombreMeses[mesVista]}</h3>
                            <div className="flex flex-col gap-2 max-h-[220px] overflow-y-auto pr-1">
                                {tradesDelMesActual.length === 0 ? (
                                    <p className="text-xs text-gray-600 text-center py-4 font-semibold italic">No hay operaciones en este período.</p>
                                ) : (
                                    tradesDelMesActual.map((t) => (
                                        <div key={t.id} className="bg-bgCard pl-4 pr-2 py-2.5 rounded-xl border border-gray-800/80 flex justify-between items-center gap-2">
                                            <div className="flex items-center gap-3 min-w-0">
                                                <span className="text-[10px] font-mono font-bold text-gray-500 shrink-0">DÍA {String(t.dia).padStart(2, '0')}</span>
                                                <span className="font-black text-sm text-white truncate">{t.activo}</span>
                                            </div>
                                            <div className="flex items-center gap-3 shrink-0">
                                                <span className={`font-mono font-bold text-xs ${t.resultado >= 0 ? 'text-cryptoGreen' : 'text-cryptoRed'}`}>
                                                    {t.resultado >= 0 ? '+' : ''}${t.resultado.toLocaleString()}
                                                </span>
                                                <button 
                                                    onClick={() => eliminarTrade(t.id)}
                                                    className="w-6 h-6 rounded-md bg-gray-800 hover:bg-cryptoRed/20 text-gray-400 hover:text-cryptoRed flex items-center justify-center text-sm font-bold transition-all"
                                                >
                                                    &times;
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                    </main>

                    {/* Nav Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-bgCard border-t border-gray-800 px-12 py-4 flex justify-between items-center z-50">
                        <button 
                            onClick={() => setVista('calendario')}
                            className={`flex flex-col items-center gap-1 transition-all ${vista === 'calendario' ? 'text-gold scale-105' : 'text-gray-600'}`}
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
                            <span className="text-[9px] font-black uppercase tracking-wider">Calendario</span>
                        </button>
                        
                        <button 
                            onClick={() => setVista('metricas')}
                            className={`flex flex-col items-center gap-1 transition-all ${vista === 'metricas' ? 'text-gold scale-105' : 'text-gray-600'}`}
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 3v18h18"/><path d="m18.7 8-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                            <span className="text-[9px] font-black uppercase tracking-wider">Métricas</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Journal Cloud V5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0e11">

    <!-- Tailwind CSS y Chart.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgMain: '#0b0e11',
                        bgCard: '#181a20',
                        bgInput: '#2b2f36',
                        cryptoGreen: '#0ecb81',
                        cryptoRed: '#f6465d',
                        gold: '#f0b90b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0e11; user-select: none; -webkit-tap-highlight-color: transparent; overflow-y: auto; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-200 font-sans antialiased">
    <div id="root"></div>

    <!-- Scripts de React y Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LIBRERÍAS OFICIALES DE FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Tus credenciales reales vinculadas desde la Captura de pantalla (1907).png
        
        const firebaseConfig = {
            apiKey: "AIzaSyAts93tv702grlHPGnh6ID1QeR_3XQc",
            authDomain: "tradingjournalpro-3507c.firebaseapp.com",
            projectId: "tradingjournalpro-3507c",
            storageBucket: "tradingjournalpro-3507c.firebasestorage.app",
            messagingSenderId: "318505631445",
            appId: "1:318505631445:web:f3046b77497dd1b460ec5c"
        };

        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const hoy = new Date();
            
            // Estados de Usuario y Autenticación
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            // Estados de la aplicación
            const [mesVista, setMesVista] = useState(hoy.getMonth());
            const [añoVista, setAñoVista] = useState(hoy.getFullYear());
            const [vista, setVista] = useState('calendario'); 
            const [trades, setTrades] = useState([]);

            const [isPremium, setIsPremium] = useState(() => localStorage.getItem('trading_journal_premium') === 'true');
            const [inputCodigo, setInputCodigo] = useState('');
            const [errorCodigo, setErrorCodigo] = useState(false);

            const [activo, setActivo] = useState('');
            const [resultado, setResultado] = useState('');
            const [estado, setEstado] = useState('WIN');
            const [diaSeleccionado, setDiaSeleccionado] = useState(hoy.getDate());
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Escuchar cambios de sesión
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setTrades([]);
                });
                return () => unsubscribe();
            }, []);

            // Sincronizar datos con Firestore Cloud
            useEffect(() => {
                if (!user) return;

                const unsubscribe = db.collection('trades')
                    .where('userId', '==', user.uid)
                    .orderBy('id', 'desc')
                    .onSnapshot((snapshot) => {
                        const listaTrades = snapshot.docs.map(doc => ({
                            docId: doc.id,
                            ...doc.data()
                        }));
                        setTrades(listaTrades);
                    }, (error) => {
                        console.error("Error en Firestore de Firebase: ", error);
                    });

                return () => unsubscribe();
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (error) {
                    setAuthError(error.message);
                }
            };

            const handleLogout = () => {
                auth.signOut();
            };

            const agregarTrade = async (e) => {
                e.preventDefault();
                if (!activo || !resultado || !user) return;

                const monto = parseFloat(resultado);
                const nuevoTrade = {
                    id: Date.now(),
                    userId: user.uid,
                    activo: activo.toUpperCase(),
                    resultado: estado === 'WIN' ? Math.abs(monto) : -Math.abs(monto),
                    estado,
                    dia: parseInt(diaSeleccionado),
                    mes: mesVista,
                    año: añoVista
                };

                try {
                    await db.collection('trades').add(nuevoTrade);
                    setActivo('');
                    setResultado('');
                } catch (error) {
                    console.error("Error al guardar trade: ", error);
                }
            };

            const eliminarTrade = async (docId) => {
                try {
                    await db.collection('trades').doc(docId).delete();
                } catch (error) {
                    console.error("Error al eliminar documento: ", error);
                }
            };

            const verificarCodigo = (e) => {
                e.preventDefault();
                if (inputCodigo.trim() === "TRADERPRO2026") {
                    setIsPremium(true);
                    setErrorCodigo(false);
                    localStorage.setItem('trading_journal_premium', 'true');
                } else {
                    setErrorCodigo(true);
                }
            };

            const nombreMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const diasSemana = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
            const primerDiaIndex = new Date(añoVista, mesVista, 1).getDay();
            const totalDiasMes = new Date(añoVista, mesVista + 1, 0).getDate();
            const tradesDelMesActual = trades.filter(t => t.mes === mesVista && t.año === añoVista);
            
            const obtenerDataDia = (nroDia) => {
                const tradesDelDia = tradesDelMesActual.filter(t => t.dia === nroDia);
                if (tradesDelDia.length === 0) return null;
                return { pnl: tradesDelDia.reduce((acc, t) => acc + t.resultado, 0), count: tradesDelDia.length };
            };

            const totalPnlMes = tradesDelMesActual.reduce((acc, t) => acc + t.resultado, 0);
            const totalPnlAcumulado = trades.reduce((acc, t) => acc + t.resultado, 0);

            useEffect(() => {
                if (vista === 'metricas' && isPremium && chartRef.current && trades.length > 0) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const tradesCronologicos = [...trades].sort((a, b) => a.id - b.id);
                    let balanceAcumulado = 0;
                    const dataPuntos = [0];
                    const etiquetas = ["Inicio"];
                    tradesCronologicos.forEach(t => {
                        balanceAcumulado += t.resultado;
                        dataPuntos.push(balanceAcumulado);
                        etiquetas.push(`${t.dia}/${t.mes + 1}`);
                    });
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: etiquetas,
                            datasets: [{
                                data: dataPuntos,
                                borderColor: balanceAcumulado >= 0 ? '#0ecb81' : '#f6465d',
                                backgroundColor: 'rgba(0,0,0,0)',
                                borderWidth: 2,
                                pointBackgroundColor: '#f0b90b',
                                pointRadius: 2,
                                tension: 0.1
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [vista, trades, isPremium]);

            // Interfaz de Autenticación (Login / Registro)
            if (!user) {
                return (
                    <div className="min-h-screen max-w-md mx-auto bg-bgMain flex flex-col justify-center p-6">
                        <div className="bg-bgCard p-6 rounded-2xl border border-gray-800 shadow-2xl flex flex-col gap-4">
                            <div className="text-center mb-2">
                                <h2 className="text-xl font-black text-white uppercase tracking-wider">Trading Journal</h2>
                                <p className="text-xs text-gray-400 mt-1">Sincronización en la Nube</p>
                            </div>
                            <form onSubmit={handleAuth} className="flex flex-col gap-3">
                                <input 
                                    type="email" placeholder="Correo electrónico" value={email} onChange={(e) => setEmail(e.target.value)} required
                                    className="bg-bgInput text-white px-4 py-3 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-gold"
                                />
                                <input 
                                    type="password" placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)} required
                                    className="bg-bgInput text-white px-4 py-3 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-gold"
                                />
                                {authError && <p className="text-[10px] text-cryptoRed font-bold text-center">{authError}</p>}
                                <button type="submit" className="w-full bg-gold text-black font-black py-3 rounded-xl text-xs uppercase tracking-widest mt-1">
                                    {isRegistering ? 'Crear Cuenta Cloud' : 'Ingresar'}
                                </button>
                            </form>
                            <button onClick={() => setIsRegistering(!isRegistering)} className="text-[11px] text-gray-500 font-bold hover:text-white underline text-center">
                                {isRegistering ? '¿Ya tenés cuenta? Iniciá sesión' : '¿No tenés cuenta? Registrate gratis'}
                            </button>
                        </div>
                    </div>
                );
            }

            // Interfaz Principal de la Aplicación
            return (
                <div className="min-h-screen max-w-md mx-auto bg-bgMain flex flex-col pb-24">
                    <header className="bg-bgMain px-4 py-4 border-b border-gray-800 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-2.5 h-2.5 bg-cryptoGreen rounded-full"></div>
                            <h1 className="text-base font-black tracking-wider uppercase">Trading Journal</h1>
                        </div>
                        <button onClick={handleLogout} className="text-[9px] text-cryptoRed font-bold bg-cryptoRed/10 border border-cryptoRed/20 px-2 py-1 rounded-lg">
                            CERRAR SESIÓN
                        </button>
                    </header>

                    <main className="p-4 flex flex-col gap-5 flex-1">
                        {(vista === 'calendario' || isPremium) && (
                            <div className="bg-bgCard rounded-2xl border border-gray-800 p-4 shadow-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setMesVista(mesVista === 0 ? 11 : mesVista - 1)} className="w-8 h-8 rounded-lg bg-bgInput flex items-center justify-center font-bold text-gray-400">&lt;</button>
                                        <h2 className="text-sm font-black text-white uppercase tracking-wide min-w-[110px] text-center">
                                            {nombreMeses[mesVista]} <span className="text-gray-500 font-mono text-xs">{añoVista}</span>
                                        </h2>
                                        <button onClick={() => setMesVista(mesVista === 11 ? 0 : mesVista + 1)} className="w-8 h-8 rounded-lg bg-bgInput flex items-center justify-center font-bold text-gray-400">&gt;</button>
                                    </div>
                                    <span className={`text-xs font-bold font-mono px-2 py-1 rounded ${totalPnlMes >= 0 ? 'text-cryptoGreen bg-cryptoGreen/10' : 'text-cryptoRed bg-cryptoRed/10'}`}>
                                        ${totalPnlMes.toLocaleString()}
                                    </span>
                                </div>

                                {vista === 'calendario' ? (
                                    <React.Fragment>
                                        <div className="grid grid-cols-7 gap-1 text-center mb-1">
                                            {diasSemana.map(d => <span key={d} className="text-[9px] text-gray-500 font-bold">{d}</span>)}
                                        </div>
                                        <div className="grid grid-cols-7 gap-1.5">
                                            {Array(primerDiaIndex).fill(null).map((_, i) => <div key={i}></div>)}
                                            {Array(totalDiasMes).fill(null).map((_, index) => {
                                                const nroDia = index + 1;
                                                const dataDia = obtenerDataDia(nroDia);
                                                return (
                                                    <div key={nroDia} onClick={() => setDiaSeleccionado(nroDia)} className={`aspect-square rounded-lg flex flex-col justify-between p-1 text-[10px] cursor-pointer ${dataDia ? (dataDia.pnl >= 0 ? 'bg-cryptoGreen text-black font-bold' : 'bg-cryptoRed text-white font-bold') : 'bg-bgInput/40 text-gray-400'} ${diaSeleccionado === nroDia ? 'ring-2 ring-gold' : ''}`}>
                                                        <span>{nroDia}</span>
                                                        {dataDia && <span className="text-[7px] truncate">{Math.round(dataDia.pnl)}</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </React.Fragment>
                                ) : (
                                    <div className="w-full relative h-[180px]"><canvas ref={chartRef}></canvas></div>
                                )}
                            </div>
                        )}

                        {(vista === 'metricas' && !isPremium) && (
                            <div className="bg-bgCard rounded-2xl border border-gray-800 p-6 text-center flex flex-col items-center gap-4">
                                <span className="text-2xl">🔒</span>
                                <h2 className="text-sm font-black text-white uppercase">Métricas Avanzadas Pro</h2>
                                <form onSubmit={verificarCodigo} className="w-full flex flex-col gap-2">
                                    <input type="text" placeholder="Código de acceso Pro" value={inputCodigo} onChange={(e) => setInputCodigo(e.target.value)} className="bg-bgInput text-white px-4 py-2.5 rounded-xl text-xs text-center border border-transparent focus:border-gold uppercase tracking-widest outline-none"/>
                                    {errorCodigo && <span className="text-[9px] text-cryptoRed font-bold">Código incorrecto.</span>}
                                    <button type="submit" className="bg-gold text-black font-black py-2.5 rounded-xl text-xs uppercase tracking-wider">Validar Código</button>
                                </form>
                            </div>
                        )}

                        {(vista === 'metricas' && isPremium) && (
                            <div className="grid grid-cols-2 gap-2">
                                <div className="bg-bgCard p-3 rounded-xl border border-gray-800"><span className="text-[9px] text-gray-500 font-bold block">PnL MES</span><span className="text-sm font-black text-white">${totalPnlMes}</span></div>
                                <div className="bg-bgCard p-3 rounded-xl border border-gold/20"><span className="text-[9px] text-gold font-bold block">ACUMULADO</span><span className="text-sm font-black text-white">${totalPnlAcumulado}</span></div>
                            </div>
                        )}

                        {vista === 'calendario' && (
                            <form onSubmit={agregarTrade} className="bg-bgCard p-4 rounded-2xl border border-gray-800 flex flex-col gap-3">
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" placeholder="Activo (BTC)" value={activo} onChange={(e) => setActivo(e.target.value)} className="bg-bgInput text-white px-3 py-2.5 rounded-xl text-xs font-bold outline-none"/>
                                    <input type="number" placeholder="Resultado USD" value={resultado} onChange={(e) => setResultado(e.target.value)} className="bg-bgInput text-white px-3 py-2.5 rounded-xl text-xs font-bold outline-none"/>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <button type="button" onClick={() => setEstado('WIN')} className={`py-2 rounded-xl text-xs font-bold ${estado === 'WIN' ? 'bg-cryptoGreen text-black' : 'bg-bgInput'}`}>WIN</button>
                                    <button type="button" onClick={() => setEstado('LOSS')} className={`py-2 rounded-xl text-xs font-bold ${estado === 'LOSS' ? 'bg-cryptoRed text-white' : 'bg-bgInput'}`}>LOSS</button>
                                </div>
                                <button type="submit" className="bg-gold text-black font-black py-3 rounded-xl text-xs uppercase tracking-wider">Guardar en la Nube</button>
                            </form>
                        )}

                        <div>
                            <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-2 px-1">Operaciones del Mes</h3>
                            <div className="flex flex-col gap-2 max-h-[200px] overflow-y-auto">
                                {tradesDelMesActual.map(t => (
                                    <div key={t.id} className="bg-bgCard px-4 py-3 rounded-xl border border-gray-800 flex justify-between items-center">
                                        <span className="text-xs font-black text-white">{t.activo} (Día {t.dia})</span>
                                        <div className="flex items-center gap-3">
                                            <span className={`font-bold text-xs ${t.resultado >= 0 ? 'text-cryptoGreen' : 'text-cryptoRed'}`}>${t.resultado}</span>
                                            <button onClick={() => eliminarTrade(t.docId)} className="text-gray-500 hover:text-cryptoRed font-bold">&times;</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* Navegación Fija Inferior */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-bgCard border-t border-gray-800 px-12 py-4 flex justify-between items-center z-50">
                        <button onClick={() => setVista('calendario')} className={`flex flex-col items-center gap-1 ${vista === 'calendario' ? 'text-gold' : 'text-gray-600'}`}>
                            <span className="text-[9px] font-black uppercase tracking-wider">Calendario</span>
                        </button>
                        <button onClick={() => setVista('metricas')} className={`flex flex-col items-center gap-1 ${vista === 'metricas' ? 'text-gold' : 'text-gray-600'}`}>
                            <span className="text-[9px] font-black uppercase tracking-wider">Métricas</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
